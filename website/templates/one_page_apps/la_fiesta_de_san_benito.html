<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vizualizace tanců — Pípovo stránky</title>
  <style>
    :root {
      --bg: #FFF1E2;
      --panel: #ffffff;
      --text: #000000;
      --muted: #6b7280;
      --line: #F38508;
      --blue: #2563eb;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px;
    }

    .wrap {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: .3rem;
      padding: 12px 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      align-items: center;
      justify-content: space-between;
    }

    .left-controls,
    .right-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    select {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #f3f4f6;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .playback {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .playback.is-visible {
      display: flex;
    }

    .canvas-panel {
      padding: 10px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      border-radius: 14px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .note strong {
      color: var(--text);
      font-weight: 600;
    }

    .badge {
      font-size: 15px;
    }

    .section-label {
      color: var(--muted);
      font-size: 14px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel note" id="danceNote">
      <a href="{{url_for('guest_views.dashboard')}}">Zpět na dashboard Pípovo stránek</a>
      <div id="danceNoteBody" style="margin-top: 8px;"></div>
    </div>

    <div class="panel controls">
      <div class="left-controls">
        <label>
          Tanec
          <select id="danceSelect" aria-label="Výběr tance"></select>
        </label>
        <label><input type="checkbox" id="toggleBackdrop" checked> <span id="backdropLabel">Podklad</span></label>
        <label><input type="checkbox" id="toggleTrails" checked> Trajektorie</label>
        <label><input type="checkbox" id="toggleGuidePoints" checked> Průchozí body</label>
        <label><input type="checkbox" id="toggleLabels"> Čísla dob</label>
      </div>
      <div class="right-controls">
        <div class="playback" id="playbackControls">
          <button type="button" id="btnStepBack" title="O krok zpět">◀ Zpět</button>
          <button type="button" id="btnPlayPause" title="Zastavit / přehrát">Zastavit</button>
          <button type="button" id="btnStepFwd" title="O krok vpřed">Vpřed ▶</button>
          <button type="button" id="btnSpeed" title="Rychlost přehrávání">1×</button>
        </div>
        <div class="badge">Pozice: <strong id="beatInCycle">1</strong> / <span id="beatTotal">4</span></div>
        <div class="section-label" id="sectionLabel"></div>
      </div>
    </div>

    <div class="panel canvas-panel">
      <canvas id="danceCanvas" width="900" height="900"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('danceCanvas');
    const ctx = canvas.getContext('2d');
    const center = { x: canvas.width / 2, y: canvas.height / 2 };
    const dotRadius = 10;
    const MOVE_FRACTION = 0.5;

    const danceSelect = document.getElementById('danceSelect');
    const toggleBackdrop = document.getElementById('toggleBackdrop');
    const toggleTrails = document.getElementById('toggleTrails');
    const toggleGuidePoints = document.getElementById('toggleGuidePoints');
    const toggleLabels = document.getElementById('toggleLabels');
    const backdropLabel = document.getElementById('backdropLabel');
    const beatInCycleEl = document.getElementById('beatInCycle');
    const beatTotalEl = document.getElementById('beatTotal');
    const sectionLabelEl = document.getElementById('sectionLabel');
    const danceNoteBody = document.getElementById('danceNoteBody');
    const playbackControls = document.getElementById('playbackControls');
    const btnPlayPause = document.getElementById('btnPlayPause');
    const btnStepBack = document.getElementById('btnStepBack');
    const btnStepFwd = document.getElementById('btnStepFwd');
    const btnSpeed = document.getElementById('btnSpeed');

    const SPEED_STEPS = [1, 0.5, 0.25];
    const SPEED_LABELS = ['1×', '½×', '¼×'];
    let speedIndex = 0;

    // ——— shared helpers ———

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function patternPointAt(pattern, stepIndex, phase, destIndex) {
      const endIdx = destIndex != null ? destIndex : stepIndex + 1;
      const start = pattern[stepIndex];
      const end = pattern[endIdx];
      return [
        lerp(start[0], end[0], phase),
        lerp(start[1], end[1], phase),
      ];
    }

    function framesPoseEqual(dance, i, j) {
      return dance.dancers.every((dancer) => {
        const a = dancer.pattern[i];
        const b = dancer.pattern[j];
        return a && b && a[0] === b[0] && a[1] === b[1];
      });
    }

    /** Ordered keyframes for a dance. Each entry: { id, beat }. */
    function getTimeline(dance) {
      if (dance.timeline) {
        return dance.timeline.map(f => ({ id: f.id, beat: f.beat }));
      }
      // Default: one keyframe per integer beat 0..stepCount
      const tl = [];
      for (let i = 0; i <= dance.stepCount; i++) {
        tl.push({ id: String(dance.guideLabelsFromZero ? i : i + 1), beat: i });
      }
      if (!dance.guideLabelsFromZero) {
        for (let i = 0; i < dance.stepCount; i++) tl[i].id = String(i + 1);
        tl[dance.stepCount].id = '1';
      }
      return tl;
    }

    // When the last keyframe is not a duplicate of the first, the engine adds a
    // wrap segment last→first so playback/stepping never jump. Closing-frame
    // dances (last pose == first) keep the old model with no extra wrap.
    function getWrapBeats(dance) {
      if (dance.wrapBeats === 0) return 0;
      const n = dance.dancers[0].pattern.length;
      if (n < 2) return 0;
      if (framesPoseEqual(dance, 0, n - 1)) return 0;
      if (dance.wrapBeats != null) return dance.wrapBeats;
      // Custom timeline without a closing duplicate → wrap by default
      if (dance.timeline) return 1;
      return 0;
    }

    function getCycleBeats(dance) {
      const tl = getTimeline(dance);
      return tl[tl.length - 1].beat + getWrapBeats(dance);
    }

    function isHalfBeatFrame(frame) {
      if (!frame) return false;
      if (/[a-z]$/i.test(String(frame.id))) return true;
      return Math.abs(frame.beat - Math.round(frame.beat)) > 1e-6;
    }

    function getFullBeatIndices(timeline) {
      const idxs = [];
      for (let i = 0; i < timeline.length; i++) {
        if (!isHalfBeatFrame(timeline[i])) idxs.push(i);
      }
      return idxs.length ? idxs : [0];
    }

    /** Effective beat time for a waypoint inside a full-beat group (wrap end → cycleBeats). */
    function groupWaypointBeat(timeline, idx, group) {
      if (group.wraps && idx === group.bIdx) return group.bBeat;
      return timeline[idx].beat;
    }

    /**
     * Full-beat group containing beatInCycle: from full-beat A to next full-beat B,
     * including any half-beat waypoints in between. Pause lives only at B.
     */
    function findFullBeatGroup(dance, beatInCycle) {
      const timeline = getTimeline(dance);
      const cycleBeats = getCycleBeats(dance);
      const wrapBeats = getWrapBeats(dance);
      const fullIdxs = getFullBeatIndices(timeline);

      for (let g = 0; g < fullIdxs.length; g++) {
        const aIdx = fullIdxs[g];
        const isLast = g === fullIdxs.length - 1;
        const bIdx = isLast ? fullIdxs[0] : fullIdxs[g + 1];
        const aBeat = timeline[aIdx].beat;
        const wraps = isLast && wrapBeats > 0;
        const bBeat = wraps ? cycleBeats : timeline[bIdx].beat;

        const inGroup = wraps
          ? beatInCycle >= aBeat
          : (beatInCycle >= aBeat && beatInCycle < bBeat);

        if (!inGroup) continue;

        const waypoints = [];
        if (!wraps) {
          for (let i = aIdx; i <= bIdx; i++) waypoints.push(i);
        } else {
          for (let i = aIdx; i < timeline.length; i++) waypoints.push(i);
          if (waypoints[waypoints.length - 1] !== bIdx) waypoints.push(bIdx);
        }

        return { aIdx, bIdx, aBeat, bBeat, waypoints, wraps };
      }

      // Fallback: first group
      const aIdx = fullIdxs[0];
      const bIdx = fullIdxs.length > 1 ? fullIdxs[1] : aIdx;
      const waypoints = [];
      for (let i = aIdx; i <= bIdx; i++) waypoints.push(i);
      return {
        aIdx,
        bIdx,
        aBeat: timeline[aIdx].beat,
        bBeat: timeline[bIdx].beat,
        waypoints,
        wraps: false,
      };
    }

    function findGroupForSegment(dance, from, to) {
      const timeline = getTimeline(dance);
      const wrapBeats = getWrapBeats(dance);
      const cycleBeats = getCycleBeats(dance);
      const n = timeline.length;
      // Probe a beat slightly inside the segment (incl. wrap either direction).
      let probe;
      if (from === n - 1 && to === 0 && wrapBeats > 0) {
        probe = timeline[from].beat + Math.min(0.01, wrapBeats / 2);
      } else if (from === 0 && to === n - 1 && wrapBeats > 0) {
        probe = timeline[to].beat + Math.min(0.01, wrapBeats / 2);
      } else {
        const a = timeline[from].beat;
        const b = timeline[to].beat;
        probe = a + (b - a) * 0.5;
      }
      if (probe >= cycleBeats) probe = Math.max(0, cycleBeats - 1e-6);
      return findFullBeatGroup(dance, probe);
    }

    /** Move duration (in beats) for one keyframe→keyframe step inside its full-beat group. */
    function subSegmentMoveBeats(dance, from, to) {
      const timeline = getTimeline(dance);
      const group = findGroupForSegment(dance, from, to);
      const parentDuration = Math.max(1e-9, group.bBeat - group.aBeat);
      const moveWindow = parentDuration * MOVE_FRACTION;
      const bFrom = groupWaypointBeat(timeline, from, group);
      const bTo = groupWaypointBeat(timeline, to, group);
      const delta = Math.abs(bTo - bFrom);
      return Math.max(0.05, moveWindow * (delta / parentDuration));
    }

    function getStateAtTime(t, dance) {
      const beatDuration = 60 / dance.bpm;
      const timeline = getTimeline(dance);
      const cycleBeats = getCycleBeats(dance);
      const totalBeats = t / beatDuration;
      const beatInCycle = ((totalBeats % cycleBeats) + cycleBeats) % cycleBeats;
      const group = findFullBeatGroup(dance, beatInCycle);
      const parentDuration = Math.max(1e-9, group.bBeat - group.aBeat);
      const moveWindow = parentDuration * MOVE_FRACTION;
      const localInParent = beatInCycle - group.aBeat;

      // Wait on the destination full beat after the move window.
      if (localInParent >= moveWindow) {
        return {
          beatIndex: Math.floor(totalBeats),
          beatInCycle: timeline[group.bIdx].id,
          beatPhase: 1,
          stepIndex: group.waypoints[group.waypoints.length - 2] ?? group.aIdx,
          destIndex: group.bIdx,
          frameId: timeline[group.bIdx].id,
          moving: false,
          localMovePhase: 1,
          beatFloat: beatInCycle,
          segmentBeats: parentDuration,
          destIsHalf: false,
        };
      }

      // Progress u through the move window maps across all waypoints A..B.
      const u = localInParent / moveWindow;
      const fracs = group.waypoints.map((idx) => {
        const b = groupWaypointBeat(timeline, idx, group);
        return (b - group.aBeat) / parentDuration;
      });

      let sub = 0;
      for (let i = 0; i < fracs.length - 1; i++) {
        if (u >= fracs[i] && u <= fracs[i + 1] + 1e-9) {
          sub = i;
          break;
        }
        if (i === fracs.length - 2) sub = i;
      }

      const f0 = fracs[sub];
      const f1 = fracs[sub + 1];
      const span = Math.max(1e-9, f1 - f0);
      const raw = Math.min(1, Math.max(0, (u - f0) / span));
      const stepIndex = group.waypoints[sub];
      const destIndex = group.waypoints[sub + 1];
      const destIsHalf = isHalfBeatFrame(timeline[destIndex]);

      return {
        beatIndex: Math.floor(totalBeats),
        beatInCycle: timeline[destIndex].id,
        beatPhase: raw,
        stepIndex,
        destIndex,
        frameId: raw < 1 ? timeline[stepIndex].id : timeline[destIndex].id,
        moving: raw < 1,
        localMovePhase: destIsHalf ? raw : easeOutCubic(raw),
        beatFloat: beatInCycle,
        segmentBeats: parentDuration * span,
        destIsHalf,
      };
    }

    function sectionLabelFor(dance, state) {
      if (!dance.sections) return '';
      const beat = state.beatFloat != null ? state.beatFloat : 0;
      const hit = dance.sections.find(s => beat >= s.fromBeat && beat < s.toBeat);
      return hit ? hit.label : '';
    }

    // ——— San Benito (polar circle) ———

    const sanBenitoBaseRadius = 270;
    const sanBenitoRadialUnit = 38;
    const sanBenitoXUnitAngle = Math.PI / 16;

    const bluePattern = [
      [0, 1],
      [2, 0],
      [2, -2],
      [2, 0],
      [4, 1],
    ];

    const redPattern = [
      [4, -2],
      [4, 0],
      [2, 1],
      [0, 0],
      [0, -2],
    ];

    const sanBenitoDancers = [];
    // Osm stejných úseků po 45°. Modrý a červený tanečník v každém
    // úseku používají stejný počátek osy x.
    for (let i = 0; i < 8; i++) {
      const baseAngle = Math.PI / 2 + i * (Math.PI / 4);
      sanBenitoDancers.push({
        color: '#2563eb',
        label: '',
        baseAngle,
        pattern: bluePattern,
      });
      sanBenitoDancers.push({
        color: '#dc2626',
        label: '',
        baseAngle,
        pattern: redPattern,
      });
    }

    function sanBenitoToCanvas(dancer, p) {
      const [x, y] = p;
      const angle = dancer.baseAngle + x * sanBenitoXUnitAngle;
      const radius = sanBenitoBaseRadius - y * sanBenitoRadialUnit;
      return {
        x: center.x + radius * Math.cos(angle),
        y: center.y - radius * Math.sin(angle),
      };
    }

    function sanBenitoBackdrop() {
      ctx.save();
      ctx.strokeStyle = '#c7cdd8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(center.x, center.y, sanBenitoBaseRadius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ——— Congo de Captieux (Cartesian square / quadrette) ———
    // Dance coords: x right, y up. Square half-side CONGO_S.
    // Start at the four corners; other frames stay on edges or diagonals.
    // Timeline may include half-beats (e.g. "0a" at beat 0.5).

    const CONGO_S = 2.4;
    const congoUnit = 120;

    function congoToCanvas(_dancer, p) {
      return {
        x: center.x + p[0] * congoUnit,
        y: center.y - p[1] * congoUnit,
      };
    }

    function congoBackdrop() {
      const half = CONGO_S * congoUnit;
      const left = center.x - half;
      const right = center.x + half;
      const top = center.y - half;
      const bottom = center.y + half;

      ctx.save();
      ctx.strokeStyle = '#c7cdd8';
      ctx.lineWidth = 2;

      // Square floor
      ctx.strokeRect(left, top, half * 2, half * 2);

      // Diagonals (X)
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(right, bottom);
      ctx.moveTo(right, top);
      ctx.lineTo(left, bottom);
      ctx.stroke();

      // Horizontal midline
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(left, center.y);
      ctx.lineTo(right, center.y);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.restore();
    }

    // Corners: NW=(-S,S) WN, NE=(S,S) MN, SW=(-S,-S) MS, SE=(S,-S) WS
    // One list per keyframe: id + beat + dancer positions (edit the dance here only).
    const S = CONGO_S;

    const congoFrames = [
      {
        id: '0', beat: 0,
        MN: [S, S], WN: [-S, S],
        MS: [-S, -S], WS: [S, -S],
      },
      {
        id: '1', beat: 1,
        MN: [S, S * 0.28], WN: [-S, S * 0.28],
        MS: [-S, -S * 0.28], WS: [S, -S * 0.28],
      },
      {
        id: '2', beat: 2,
        MN: [S, S], WN: [-S, S],
        MS: [-S, -S], WS: [S, -S],
      },
      {
        id: '3', beat: 3,
        MN: [S, S * 0.28], WN: [-S, S * 0.28],
        MS: [-S, -S * 0.28], WS: [S, -S * 0.28],
      },
      {
        id: '3a', beat: 3.5,
        MN: [0, S * 0.2], WN: [0, S * 0.4],
        MS: [0, -S * 0.2], WS: [0, -S * 0.4],
      },
      {
        id: '4', beat: 4,
        MN: [-S, S], WN: [S, S],
        MS: [S, -S], WS: [-S, -S],
      },
      {
        id: '5', beat: 5,
        MN: [-S, S * 0.18], WN: [S, S * 0.18],
        MS: [S, -S * 0.18], WS: [-S, -S * 0.18],
      },
      {
        id: '6', beat: 6,
        MN: [-S, S], WN: [S, S],
        MS: [S, -S], WS: [-S, -S],
      },
      {
        id: '6a', beat: 6.5,
        MN: [0, S], WN: [0, S * 0.64],
        MS: [0, -S], WS: [0, -S * 0.64],
      },
      {
        id: '7', beat: 7,
        MN: [S, S * 0.28], WN: [-S, S * 0.28],
        MS: [-S, -S * 0.28], WS: [S, -S * 0.28],
      },
      {
        id: '8', beat: 8,
        MN: [S, S], WN: [-S, S],
        MS: [-S, -S], WS: [S, -S],
      },
      {
        id: '9', beat: 9,
        MN: [S, 0], WN: [S * 0.22, 0],
        WS: [-S * 0.22, 0], MS: [-S, 0],
      },
      {
        id: '10', beat: 10,
        MN: [-S, 0], WN: [S, -S],
        MS: [S, 0], WS: [-S, S],
      },
      {
        id: '11', beat: 11,
        MN: [-S, -S], WN: [S, 0],
        MS: [S, S], WS: [-S, 0],
      },
      {
        id: '12', beat: 12,
        MN: [-S, -S], WN: [S, -S],
        MS: [S, S], WS: [-S, S],
      },
      {
        id: '13', beat: 13,
        MN: [-S, 0], WN: [-S * 0.22, 0],
        WS: [S * 0.22, 0], MS: [S, 0],
      },
      {
        id: '14', beat: 14,
        MN: [S, 0], WN: [-S, S],
        MS: [-S, 0], WS: [S, -S],
      },
      {
        id: '15', beat: 15,
        MN: [S * 0.15, S * 0.15], WN: [S * 0.4, S * 0.4],
        MS: [-S * 0.15, -S * 0.15], WS: [-S * 0.4, -S * 0.4],
      },
      {
        id: '15a', beat: 15.5,
        MN: [0, S * 0.4], WN: [0, S * 0.2],
        MS: [0, -S * 0.4], WS: [0, -S * 0.2],
      },
    ];

    function congoPatternFor(role) {
      return congoFrames.map(frame => frame[role]);
    }

    const congoDancers = [
      { id: 'MN', color: '#2563eb', label: 'MN', pattern: congoPatternFor('MN') },
      { id: 'WN', color: '#dc2626', label: 'WN', pattern: congoPatternFor('WN') },
      { id: 'MS', color: '#2563eb', label: 'MS', pattern: congoPatternFor('MS') },
      { id: 'WS', color: '#dc2626', label: 'WS', pattern: congoPatternFor('WS') },
    ];

    // ——— dance registry ———

    const DANCES = {
      san_benito: {
        id: 'san_benito',
        title: 'Porthogese — La fiesta de San Benito',
        bpm: 89,
        stepCount: 4,
        dancers: sanBenitoDancers,
        toCanvas: sanBenitoToCanvas,
        drawBackdrop: sanBenitoBackdrop,
        backdropName: 'Obrys kruhu',
        showStepControls: false,
        guideLabelsFromZero: false,
        hideClosingGuidePoint: false,
        noteHtml:
          'Vizualizace tance Porthogese tak, jak nás jej učil Gianmarco. Originální hudbu sice neznáme, ' +
          'ale italská balfolková komunita našla tuto píseň a zjistila, že na tanec sedí perfektně: ' +
          'La fiesta de San Benito (<a href="https://youtu.be/wmtiT42PiAk?si=uNRYBLQwFSke3XO5" target="_blank" rel="noopener">hudba na youtube</a>). ' +
          'Vytvořeno zcela pomocí ChatGPT, doupravil Josef Lát v červenci 2026.',
      },
      congo_de_captieux: {
        id: 'congo_de_captieux',
        title: 'Congo de Captieux',
        bpm: 96,
        stepCount: 16,
        timeline: congoFrames,
        dancers: congoDancers,
        toCanvas: congoToCanvas,
        drawBackdrop: congoBackdrop,
        backdropName: 'Obrys podlahy',
        showStepControls: true,
        guideLabelsFromZero: true,
        hideClosingGuidePoint: true,
        wrapBeats: 0.5,
        baseSpeed: 0.7,
        sections: [
          { fromBeat: 0, toBeat: 2, label: 'Část 1 — Saluto' },
          { fromBeat: 2, toBeat: 4, label: 'Část 1 — Cambio di posto' },
          { fromBeat: 4, toBeat: 6, label: 'Část 2 — Salto' },
          { fromBeat: 6, toBeat: 8, label: 'Část 2 — Papillon' },
          { fromBeat: 8, toBeat: 10, label: 'Část 3 — 1° diagonale' },
          { fromBeat: 10, toBeat: 12, label: 'Část 3 — Tergicristallo' },
          { fromBeat: 12, toBeat: 14, label: 'Část 4 — 2° diagonale' },
          { fromBeat: 14, toBeat: 16, label: 'Část 4 — Spallata a konec' },
        ],
        noteHtml:
          'Vizualizace tance Congo de Captieux (Guascogne) — dvě páry naproti sobě (quadrette), ' +
          'podle popisu a diagramů na ' +
          '<a href="https://ballifolk.altervista.org/congo_de_captieux.html" target="_blank" rel="noopener">ballifolk.altervista.org</a>. ' +
          'Červená = muži (MN/MS), modrá = ženy (WN/WS). Pohyb převážně po stranách a úhlopříčkách čtverce. ' +
          'Timeline podporuje půldoby (např. <code>0a</code> v 0.5).',
      },
    };

    // ——— engine ———

    let currentDance = DANCES.san_benito;
    let running = true;
    let elapsedSeconds = 0;
    let lastFrameNow = null;
    // When set, dancers are frozen on pattern[holdFrame] (timeline index).
    let holdFrame = null;
    // One-shot tween between timeline frames (next/back buttons).
    let stepTween = null;

    function maxHoldFrame(dance) {
      return getTimeline(dance).length - 1;
    }

    function beatDurationSec(dance) {
      return 60 / dance.bpm;
    }

    function frameLabelAt(dance, index) {
      const tl = getTimeline(dance);
      return tl[Math.max(0, Math.min(index, tl.length - 1))].id;
    }

    function positionLabel(dance, state) {
      if (stepTween) {
        return frameLabelAt(dance, stepTween.toFrame);
      }
      if (holdFrame != null) {
        return frameLabelAt(dance, holdFrame);
      }
      return state.frameId;
    }

    function sectionStateFor(dance, state) {
      if (stepTween) {
        const tl = getTimeline(dance);
        return { beatFloat: tl[stepTween.fromFrame].beat };
      }
      if (holdFrame != null) {
        const tl = getTimeline(dance);
        return { beatFloat: tl[holdFrame].beat };
      }
      return state;
    }

    function syncPlayPauseButton() {
      btnPlayPause.textContent = running ? 'Zastavit' : 'Přehrát';
    }

    function syncSpeedButton() {
      btnSpeed.textContent = SPEED_LABELS[speedIndex];
    }

    function uiSpeed() {
      return SPEED_STEPS[speedIndex];
    }

    function effectiveSpeed(dance) {
      const base = dance.baseSpeed != null ? dance.baseSpeed : 1;
      return base * uiSpeed();
    }

    function setStepButtonsEnabled(enabled) {
      btnStepBack.disabled = !enabled;
      btnStepFwd.disabled = !enabled;
    }

    function pauseAtCurrentFrame() {
      const dance = currentDance;
      if (stepTween) {
        holdFrame = stepTween.toFrame;
        stepTween = null;
        setStepButtonsEnabled(true);
      } else {
        const state = getStateAtTime(elapsedSeconds, dance);
        // Land on the frame currently shown (end of transition if waiting, start if mid-move).
        holdFrame = state.moving ? state.stepIndex : state.destIndex;
      }
      running = false;
      syncPlayPauseButton();
    }

    function playFromHold() {
      const dance = currentDance;
      if (stepTween) {
        holdFrame = stepTween.toFrame;
        stepTween = null;
        setStepButtonsEnabled(true);
      }
      const tl = getTimeline(dance);
      const idx = holdFrame == null ? 0 : Math.min(holdFrame, tl.length - 1);
      elapsedSeconds = tl[idx].beat * beatDurationSec(dance);
      holdFrame = null;
      running = true;
      lastFrameNow = null;
      syncPlayPauseButton();
    }

    function stepBy(delta) {
      if (stepTween || running) {
        if (running) pauseAtCurrentFrame();
        if (stepTween) return;
      }
      const dance = currentDance;
      if (holdFrame == null) {
        pauseAtCurrentFrame();
      }

      const max = maxHoldFrame(dance);
      const from = holdFrame;
      const to = (from + delta + (max + 1)) % (max + 1);

      // Skip tween only if EVERY dancer is already at the destination pose
      // (true duplicate frames). Never use this for loop wrap when poses differ.
      const samePose = framesPoseEqual(dance, from, to);
      if (samePose) {
        holdFrame = to;
        running = false;
        syncPlayPauseButton();
        return;
      }

      holdFrame = null;
      running = false;
      // Same subdivided move window as continuous play (half-beats split the parent move).
      const moveBeats = subSegmentMoveBeats(dance, from, to);
      const destIsHalf = isHalfBeatFrame(getTimeline(dance)[to]);
      stepTween = {
        fromFrame: from,
        toFrame: to,
        startMs: performance.now(),
        durationMs: Math.max(0.05, moveBeats) * beatDurationSec(dance) * 1000 / effectiveSpeed(dance),
        destIsHalf,
      };
      setStepButtonsEnabled(false);
      syncPlayPauseButton();
    }

    function resetClock() {
      elapsedSeconds = 0;
      lastFrameNow = null;
      holdFrame = null;
      stepTween = null;
      running = true;
      setStepButtonsEnabled(true);
      syncPlayPauseButton();
      syncSpeedButton();
    }

    function applyDance(dance) {
      currentDance = dance;
      document.title = dance.title + ' — Pípovo stránky';
      danceNoteBody.innerHTML = dance.noteHtml;
      backdropLabel.textContent = dance.backdropName;
      beatTotalEl.textContent = String(getCycleBeats(dance));
      playbackControls.classList.toggle('is-visible', !!dance.showStepControls);
      resetClock();
    }

    function drawGuidePoints(dance) {
      const timeline = getTimeline(dance);
      const lastIdx = timeline.length - 1;
      const hideLast = dance.hideClosingGuidePoint && framesPoseEqual(dance, 0, lastIdx);

      dance.dancers.forEach((dancer) => {
        const pts = dancer.pattern.map(p => dance.toCanvas(dancer, p));
        pts.forEach((p, idx) => {
          if (hideLast && idx === lastIdx) return;

          ctx.save();
          ctx.fillStyle = dancer.color;
          ctx.globalAlpha = 0.30;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (toggleLabels.checked && !(hideLast && idx === lastIdx)) {
            const label = timeline[idx].id;
            ctx.save();
            ctx.fillStyle = '#111827';
            ctx.font = '12px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, p.x, p.y - 14);
            ctx.restore();
          }
        });
      });
    }

    function drawTrails(dance) {
      const timeline = getTimeline(dance);
      const wrap = getWrapBeats(dance) > 0 ? 1 : 0;
      const steps = (timeline.length - 1) + wrap;
      const sampleCount = Math.max(80, steps * 20);

      dance.dancers.forEach((dancer) => {
        ctx.save();
        ctx.strokeStyle = dancer.color;
        ctx.globalAlpha = 0.22;
        ctx.lineWidth = 2;
        ctx.beginPath();

        for (let s = 0; s <= sampleCount; s++) {
          const u = s / sampleCount;
          const total = u * steps;
          const seg = Math.min(steps - 1, Math.floor(total));
          const phase = total - seg;
          const dest = (seg === timeline.length - 1 && wrap) ? 0 : seg + 1;
          const from = Math.min(seg, timeline.length - 1);
          const p = patternPointAt(dancer.pattern, from, phase, dest);
          const c = dance.toCanvas(dancer, p);
          if (s === 0) ctx.moveTo(c.x, c.y);
          else ctx.lineTo(c.x, c.y);
        }
        ctx.stroke();
        ctx.restore();
      });
    }

    function dancerPoint(dancer, state) {
      if (stepTween) {
        const a = dancer.pattern[stepTween.fromFrame];
        const b = dancer.pattern[stepTween.toFrame];
        return [
          lerp(a[0], b[0], state.localMovePhase),
          lerp(a[1], b[1], state.localMovePhase),
        ];
      }
      if (holdFrame != null) {
        return dancer.pattern[holdFrame];
      }
      if (state.moving) {
        return patternPointAt(
          dancer.pattern, state.stepIndex, state.localMovePhase, state.destIndex
        );
      }
      return dancer.pattern[state.destIndex];
    }

    function drawDancers(dance, state) {
      dance.dancers.forEach((dancer) => {
        const p = dancerPoint(dancer, state);
        const c = dance.toCanvas(dancer, p);

        ctx.save();
        ctx.fillStyle = dancer.color;
        ctx.beginPath();
        ctx.arc(c.x, c.y, dotRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(17,24,39,0.18)';
        ctx.stroke();

        if (dancer.label) {
          ctx.fillStyle = '#111827';
          ctx.font = 'bold 11px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(dancer.label, c.x, c.y - 18);
        }
        ctx.restore();
      });
    }

    function render(state) {
      const dance = currentDance;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (toggleBackdrop.checked) dance.drawBackdrop();
      if (toggleTrails.checked) drawTrails(dance);
      if (toggleGuidePoints.checked) drawGuidePoints(dance);
      drawDancers(dance, state);

      beatInCycleEl.textContent = String(positionLabel(dance, state));
      sectionLabelEl.textContent = sectionLabelFor(dance, sectionStateFor(dance, state));
    }

    function frame(now) {
      if (stepTween) {
        const u = Math.min(1, (now - stepTween.startMs) / stepTween.durationMs);
        const eased = stepTween.destIsHalf ? u : easeOutCubic(u);
        const state = {
          beatIndex: stepTween.fromFrame,
          beatInCycle: frameLabelAt(currentDance, stepTween.toFrame),
          frameId: frameLabelAt(currentDance, stepTween.toFrame),
          beatPhase: u * MOVE_FRACTION,
          stepIndex: stepTween.fromFrame,
          destIndex: stepTween.toFrame,
          moving: u < 1,
          localMovePhase: eased,
          beatFloat: getTimeline(currentDance)[stepTween.fromFrame].beat,
          destIsHalf: stepTween.destIsHalf,
        };
        render(state);
        if (u >= 1) {
          holdFrame = stepTween.toFrame;
          stepTween = null;
          setStepButtonsEnabled(true);
        }
        lastFrameNow = now;
        requestAnimationFrame(frame);
        return;
      }

      if (running) {
        if (lastFrameNow != null) {
          elapsedSeconds += ((now - lastFrameNow) / 1000) * effectiveSpeed(currentDance);
        }
      }
      lastFrameNow = now;
      const state = getStateAtTime(elapsedSeconds, currentDance);
      render(state);
      requestAnimationFrame(frame);
    }

    // ——— UI init ———

    Object.values(DANCES).forEach((dance) => {
      const opt = document.createElement('option');
      opt.value = dance.id;
      opt.textContent = dance.title;
      danceSelect.appendChild(opt);
    });

    danceSelect.addEventListener('change', () => {
      applyDance(DANCES[danceSelect.value]);
    });

    toggleLabels.addEventListener('change', () => {
      if (toggleLabels.checked) toggleGuidePoints.checked = true;
    });

    btnPlayPause.addEventListener('click', () => {
      if (running) {
        pauseAtCurrentFrame();
      } else {
        playFromHold();
      }
    });

    btnStepBack.addEventListener('click', () => stepBy(-1));
    btnStepFwd.addEventListener('click', () => stepBy(1));

    btnSpeed.addEventListener('click', () => {
      speedIndex = (speedIndex + 1) % SPEED_STEPS.length;
      syncSpeedButton();
      // If a step tween is running, scale its remaining duration to the new speed.
      if (stepTween) {
        const u = Math.min(1, (performance.now() - stepTween.startMs) / stepTween.durationMs);
        const dance = currentDance;
        const moveBeats = subSegmentMoveBeats(dance, stepTween.fromFrame, stepTween.toFrame);
        const totalMs = Math.max(0.05, moveBeats) * beatDurationSec(dance) * 1000 / effectiveSpeed(dance);
        stepTween.durationMs = totalMs;
        stepTween.startMs = performance.now() - u * totalMs;
      }
    });

    applyDance(DANCES.san_benito);
    requestAnimationFrame(frame);
  </script>
</body>
</html>

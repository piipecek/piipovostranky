{% extends "acga/student_navbar.html" %}

{% block content %}
<link rel="stylesheet" type="text/css" href="{{url_for('static',filename='css/evaluace.css')}}">
<h2 class="evaluace-nadpis">Vyplnění evaluačního dotazníku - {{name}}</h2>
<input hidden id="uuid" value="{{uuid}}">
<div id="main" class="py-3"></div>
<form method="post" id="form">
    <p>
        Pokud formulář uložíte, můžete se k němu ještě vrátit se stejným kódem a upravovat ho. Až formulář odevzdáte, už ho nebudete moct upravovat a Vašemu učiteli se zobrazí.
    </p>
    <input type="text" hidden id="result" name="result">
    <button class="btn custom-button" type="button" id="ulozit">Uložit</button>
    <button class="btn custom-button" type="button" id="odevzdat">Odevzdat</button>
</form>


<script type="module" src="{{url_for('static', filename='js/acga/evaluace_formular.js')}}"></script>


{% endblock %}

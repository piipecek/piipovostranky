{% extends "acga/teacher_navbar.html" %}
{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2 class="">Souhrnné výsledky</h2>
<p>
    Zde můžete zobrazit souhrn všech odevzdaných dotazníků za poslední období.
</p>
<form method="post" id="form">
    Přeji si ukázat souhrn statistik 
    <select id="select">
        <option value="odevzdane">odevzdaných</option>
        <option value="vytvorene">vytvořených</option>
    </select>
     od <input type="date" id="date"> do dnes.
    <button class="btn custom-button" type="button" id="ukazat">Ukázat</button>
</form>

<div id="result" hidden>
    <span id="count"></span>
    <div id="dny_histogram_wrapper">
        <p>
            Počet odevzdaných formulářů v jednotlivých dnech:
        </p>
        <div class="dny_histogram_div">
            <canvas id="dny_histogram"></canvas>
        </div>
    </div>
</div>
<script type="module" src="{{url_for('static', filename='js/acga/evaluace_statistiky.js')}}"></script>

{% endblock %}

{%extends "context.html"%}
{%block content%}

<form method="post">
	<h2> Přihlas se </h2>
	<div class="container">
		<div class="row my-1">
			<div class="col-sm-3">
				Email
			</div>
			<div class="col">
				<input type="text" name="email" id="email" maxlength="100" class="form-control"/>
			</div>
		</div>
		<div class="row my-1">
			<div class="col-sm-3">
				Heslo
			</div>
			<div class="col">
				<input type="password" name="password" id="password" maxlength="300" class="form-control"/>	
			</div>
		</div>
		<div class="row my-1">
			<div class="col-sm-3">
				<button type="submit" class="btn custom-button">Log-in</button>
			</div>
			<div class="col-auto">
				<small>
					Zapomněli jste heslo? <a class="link" href="{{url_for('auth_views.request_reset')}}">Požádat o nové</a>
				</small>
			</div>
		</div>
		<h2>
			nebo
		</h2>
		<script src="https://accounts.google.com/gsi/client" async></script>
		<div id="g_id_onload"
			data-client_id="687283986989-pr2mcvs198cu7nfqciut108dupje5a0f.apps.googleusercontent.com"
			data-context="signin"
			data-ux_mode="popup"
			data-login_uri="http://localhost:8000/auth/google_auth_receiver"
			data-auto_prompt="false">
		</div>

		<div class="g_id_signin"
			data-type="standard"
			data-shape="rectangular"
			data-theme="outline"
			data-text="continue_with"
			data-size="large"
			data-logo_alignment="left">
		</div>
	</div>
</form>
{%endblock%}
